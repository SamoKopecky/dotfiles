# Fuzzel — drop-in rofi replacement on Wayland
# Matches sway/waybar theme: grey bg #1F2228, blue accent #A8C7FF

font=JetBrainsMono Nerd Font:size=11
dpi-aware=yes
prompt="Run > "
icon-theme=Papirus
icons-enabled=yes
hide-when-empty=no
fields=name,generic,comment,categories,filename,keywords
terminal=alacritty
lines=12
width=40
horizontal-pad=20
vertical-pad=12
inner-pad=8
line-height=24

[colors]
background=1F2228FF
text=E0E1DDFF
match=A8C7FFFF
selection=2D3138FF
selection-text=E0E1DDFF
selection-match=A8C7FFFF
border=A8C7FFFF

[border]
width=2
radius=6

[dmenu]
exit-immediately-if-empty=yes

[key-bindings]
cancel=Escape Control+g
execute=Return KP_Enter
cursor-left=Left Control+b
cursor-right=Right Control+f
cursor-home=Home Control+a
cursor-end=End Control+e
delete-prev=BackSpace
delete-next=Delete Control+d
prev=Up Control+p
next=Down Control+n
prev-page=Page_Up
next-page=Page_Down
