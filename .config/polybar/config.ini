[colors]
background = #1F2228
background-alt = #2D3138
foreground = #E0E1DD
primary = #A8C7FF
secondary = #7DD3FC
alert = #FF6B6B
disabled = #6B7280

[bar/main]
monitor = ${env:MONITOR:}
width = 100%
height = 20pt 
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = JetBrainsMono Nerd Font:size=10;2

modules-left = i3
modules-right = filesystem xkeyboard memory cpu temperature wlan eth pulseaudio systray date

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

wm-restack = i3

; override-redirect = true

[module/systray]
type = internal/tray

format-margin = 2pt
tray-spacing = 8pt

[module/i3]
type = internal/i3
pin-workspaces = true
index-sort = true
enable-click = true

label-focused = %name%
label-focused-background = ${colors.background-alt}
label-focused-underline = ${colors.primary}
label-focused-padding = 1

label-unfocused = %name%
label-unfocused-padding = 1

label-visible = %name%
label-visible-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %percentage_used%% %used%/%total%

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %gb_used%/%gb_total%

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%

[module/temperature]
type = internal/temperature
interval = 2
hwmon-path = /sys/devices/pci0000:00/0000:00:18.3/hwmon/hwmon1/temp1_input
warn-temperature = 80
units = true
format = <label>
format-warn = <label-warn>
format-prefix-foreground = ${colors.primary}
format-warn-prefix-foreground = ${colors.alert}
label = %temperature-c%
label-warn = %temperature-c%
label-warn-foreground = ${colors.alert}

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#A8C7FF}%ifname%%{F#6B7280} disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#A8C7FF}%ifname%%{F-} %essid% %local_ip%

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#A8C7FF}%ifname%%{F-}

[module/date]
type = internal/date
interval = 1

date = %a %Y-%m-%d %H:%M

label-foreground = ${colors.primary}

label = %{A1:gsimplecal:}%date%%{A}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
