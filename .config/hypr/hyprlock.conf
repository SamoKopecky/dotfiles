# Hyprlock — themed lockscreen
# Docs: https://wiki.hyprland.org/Hypr-Ecosystem/hyprlock/

general {
    grace = 0
    hide_cursor = true
    no_fade_in = false
}

# Blurred wallpaper background
background {
    monitor =
    path = /home/samo/SynologyDrive/MyStuff/Pictures/space/blue_space_4k.jpg
    blur_passes = 3
    blur_size = 8
    contrast = 0.9
    brightness = 0.7
    vibrancy = 0.15
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(232, 233, 221, 1.0)
    font_size = 120
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 200
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %B %d')"
    color = rgba(168, 199, 255, 1.0)
    font_size = 28
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

# Password input
input-field {
    monitor =
    size = 320, 56
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.4
    dots_center = true
    outer_color = rgba(168, 199, 255, 1.0)
    inner_color = rgba(45, 49, 56, 0.8)
    font_color = rgba(232, 233, 221, 1.0)
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = 8
    check_color = rgba(125, 211, 252, 1.0)
    fail_color = rgba(255, 107, 107, 1.0)
    fail_text = <i>$FAIL ($ATTEMPTS attempts)</i>
    capslock_color = rgba(255, 107, 107, 1.0)
    position = 0, -180
    halign = center
    valign = center
}

# Caps lock warning
label {
    monitor =
    text = cmd[update:200] [ "$(cat /sys/class/leds/input*::capslock/brightness 2>/dev/null | head -1)" = "1" ] && echo " CAPS LOCK ON" || echo ""
    color = rgba(255, 107, 107, 1.0)
    font_size = 14
    font_family = JetBrainsMono Nerd Font
    position = 0, -260
    halign = center
    valign = center
}
