# picom v13 config
# Rounded corners, shadows, fade, blur. Tuned for i3 + polybar.

#====================================
# Backend
#====================================
backend = "glx";
vsync = true;
use-damage = true;

#====================================
# Corners
#====================================
corner-radius = 0;

rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'"
];

#====================================
# Shadows
#====================================
shadow = true;
shadow-radius = 12;
shadow-opacity = 0.25;
shadow-offset-x = -8;
shadow-offset-y = -8;

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g ?= 'Notify-osd'",
  "class_g = 'Cairo-clock'",
  "_GTK_FRAME_EXTENTS@:c"
];

#====================================
# Fading
#====================================
fading = true;
fade-in-step = 0.05;
fade-out-step = 0.05;
fade-delta = 6;

fade-exclude = [
  "class_g = 'slop'"
];

#====================================
# Opacity / Blur
#====================================
inactive-opacity = 1.0;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

blur:
{
  method = "dual_kawase";
  strength = 4;
  background = false;
  background-frame = false;
  background-fixed = false;
};

blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'Polybar'",
  "_GTK_FRAME_EXTENTS@:c"
];

#====================================
# Window-type rules
#====================================
wintypes:
{
  tooltip = { fade = true; shadow = true; opacity = 0.95; focus = true; full-shadow = false; };
  dock = { shadow = false; clip-shadow-above = true; };
  dnd = { shadow = false; };
  popup_menu = { opacity = 1.0; };
  dropdown_menu = { opacity = 1.0; };
};
